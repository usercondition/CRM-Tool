services:
  - type: web
    name: crm-tool
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      # Add in Render dashboard → Environment:
      # CRM_PASSWORD — required so your public URL is not open to everyone

databases:
  - name: crm-db
    plan: free
    databaseName: crm
    user: crm
